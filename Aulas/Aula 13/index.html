<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DISPLAYFELX 1</title>
    <style>
        body{
            display: flex ;
            flex-wrap: wrap;
            justify-content: space-between;
            /* 
            - O display flex altera o comportamento das marcações "filhas".
            - As marcações ficarão uma ao lado da outra.
            https://flexbox.help
            */
        }
        div{
            border:1px solid black;
            width: 5rem ;
            margin: 2rem ;
            padding: 2rem ;
            text-align: center;
        }

    </style>
</head>
<body>
    <div><p>1</p></div>
    <div><p>2</p></div>
    <div><p>3</p></div>
    <div><p>4</p></div>
    <div><p>5</p></div>
    <div><p>6</p></div>
    
</body>
</html>
